name: common_base_mobile_flutter
description: "灵伴AI - Flutter 移动端应用"
publish_to: 'none'  # 防止意外发布到 pub.dev
version: 1.0.1+2    # 应用版本号 1.0.1b

# Dart SDK 版本要求
environment:
  sdk: '>=3.0.0 <4.0.0'

# 项目依赖
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8         # Cupertino 图标库 IOS风格
  dio: ^5.4.0                     # Dio 库
  http: ^1.1.0                    # HTTP 库
  shared_preferences: ^2.2.2      # 本地存储库
  go_router: ^13.0.1              # 路由管理库
  provider: ^6.1.1                # 状态管理库
  form_validator: ^2.1.1          # 表单验证库
  flutter_lucide: ^1.8.0          # Lucide 图标库
  lucide_icons: ^0.257.0          # Lucide 图标库 (官方包)
  flutter_spinkit: ^5.2.0         # 加载动画库
  font_awesome_flutter: ^10.7.0   # Font Awesome 图标库
  json_annotation: ^4.8.0         # JSON 序列化库的注解
  image_picker: ^1.0.0            # 图片选择器库
  file_picker: ^8.3.0             # 文件选择器库
  web_socket_channel: ^2.4.0      # WebSocket 库
  flutter_markdown: ^0.7.0        # Markdown 渲染库
  uuid: ^4.0.0                    # UUID 库
  photo_view: ^0.14.0             # 图片预览库
  intl: ^0.19.0                   # 日期格式化库
  audioplayers: ^6.1.0            # 音频播放库
  record: ^5.2.0                  # 录音库
  permission_handler: ^11.0.1     # 权限管理库
  path_provider: ^2.1.0           # 路径获取库
  url_launcher: ^6.2.0            # URL启动库
  video_player: ^2.8.3            # 视频播放库
  chewie: ^1.8.5                  # 视频播放器UI组件
  flutter_baidu_mapapi_base: ^3.9.5  # 百度地图基础库
  flutter_baidu_mapapi_map: ^3.9.8    # 百度地图地图组件
  flutter_baidu_mapapi_utils: ^3.9.5 # 百度地图工具库
  flutter_baidu_mapapi_search: ^3.9.5 # 百度地图搜索库
  flutter_bmflocation: ^3.8.0        # 百度地图定位库

# 开发依赖
dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0          # 代码生成工具
  json_serializable: ^6.7.0     # JSON 序列化库的生成工具
  flutter_lints: ^6.0.0         # 代码规范检查
  flutter_launcher_icons: ^0.13.1 # 应用图标生成工具

# 强制覆盖问题依赖的版本
dependency_overrides:
  record_linux: ^1.2.1
  record_platform_interface: ^1.5.0
  flutter_baidu_mapapi_map: 3.9.8

# Flutter 配置
flutter:
  # 使用 Material 设计
  uses-material-design: true
  # 资源文件配置
  assets:
    - assets/lbai-logo-nosy.jpeg   # 欢迎页面 Logo
    - assets/choose_oldMans.jpeg   # 选择老人身份引导图片
    - assets/choose_youths.jpeg   # 选择青年人身份引导图片
    - assets/iphone接收信息声.wav   # 接收消息提示音
    - assets/iphone发送信息声.wav   # 发送消息提示音
    - assets/ai_chat_logo.png   # 聊天记录图标

# 应用图标配置
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/lbai-logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/lbai-logo.png"